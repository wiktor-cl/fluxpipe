name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fluxpipe
          POSTGRES_PASSWORD: fluxpipe
          POSTGRES_DB: fluxpipe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fluxpipe -d fluxpipe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://fluxpipe:fluxpipe@localhost:5432/fluxpipe
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build shared packages
        # apps/api and apps/worker resolve @fluxpipe/shared and @fluxpipe/db
        # via their compiled dist/ output (see each package's "types" field),
        # so typecheck/test/build all need these built first.
        run: npm run build --workspace packages/shared --workspace packages/db

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (no external services required)
        run: npm run test:unit

      - name: Integration tests (real Postgres + Redis)
        run: npm run test:integration

      - name: Build
        run: npm run build
